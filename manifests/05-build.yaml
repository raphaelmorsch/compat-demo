apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: compat-demo
  namespace: compat-demo
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: compat-demo
  namespace: compat-demo
spec:
  source:
    type: Git
    git:
      uri: https://github.com/raphaelmorsch/compat-demo.git
    contextDir: app
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: compat-demo:latest
  triggers:
  - type: ConfigChange
  - type: GitHub
    github:
      secret: "MYSECRET123"