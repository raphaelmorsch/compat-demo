apiVersion: v1
kind: ServiceAccount
metadata:
  name: compat-demo-sa
  namespace: compat-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: compat-demo-flowcontrol-manager
rules:
  - apiGroups: ["flowcontrol.apiserver.k8s.io"]
    resources: ["flowschemas", "prioritylevelconfigurations"]
    verbs: ["get","list","watch","create","update","patch","delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: compat-demo-flowcontrol-manager-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: compat-demo-flowcontrol-manager
subjects:
  - kind: ServiceAccount
    name: compat-demo-sa
    namespace: compat-demo