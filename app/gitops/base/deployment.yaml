apiVersion: apps/v1
kind: Deployment
metadata:
  name: compat-demo
  labels:
    app: compat-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: compat-demo
  template:
    metadata:
      labels:
        app: compat-demo
    spec:
      containers:
        - name: compat-demo
          image: image-registry.openshift-image-registry.svc:5000/compat-demo/compat-demo:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault